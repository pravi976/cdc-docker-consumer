name: Consumer CDC Pipeline (Brokerless Shared Contracts)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  JAVA_VERSION: "17"
  CDC_FRAMEWORK_VERSION: ${{ vars.CDC_FRAMEWORK_VERSION }}
  CDC_PACKAGES_OWNER: ${{ vars.CDC_PACKAGES_OWNER }}
  CDC_PACKAGES_REPO: ${{ vars.CDC_PACKAGES_REPO }}
  PACTICIPANT: supply-orders-consumer
  PROVIDER_PACTICIPANT: supply-inventory-provider
  DEPLOY_ENV: test
  PROVIDER_REPO: ${{ vars.PROVIDER_REPO || 'pravi976/cdc-docker-provider' }}
  SHARED_CONTRACT_REPO: ${{ vars.SHARED_CONTRACT_REPO || 'pravi976/cdc-docker-consumer' }}
  SHARED_CONTRACT_BRANCH: ${{ vars.SHARED_CONTRACT_BRANCH || 'contracts' }}

jobs:
  test-generate-and-publish-contract:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout Consumer Repo
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Ensure Gradle Wrapper Is Executable
        run: chmod +x ./gradlew

      - name: Run Consumer Tests and Generate Pacts
        run: ./gradlew --no-daemon clean test bootJar --stacktrace
        env:
          GH_PACKAGES_USER: ${{ github.actor }}
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Upload Pact Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: consumer-pacts
          path: build/pacts/*.json
          if-no-files-found: error

      - name: Checkout Shared Contracts Repo/Branch
        uses: actions/checkout@v5
        with:
          repository: ${{ env.SHARED_CONTRACT_REPO }}
          ref: ${{ env.SHARED_CONTRACT_BRANCH }}
          path: contracts-repo
          token: ${{ secrets.GH_REPO_DISPATCH_TOKEN || secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Initialize Shared Contracts Branch If Missing
        run: |
          if [ ! -d contracts-repo/.git ]; then
            git clone "https://x-access-token:${GH_REPO_DISPATCH_TOKEN}@github.com/${SHARED_CONTRACT_REPO}.git" contracts-repo
          fi
          cd contracts-repo
          if git ls-remote --exit-code --heads origin "${SHARED_CONTRACT_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${SHARED_CONTRACT_BRANCH}"
            git checkout -B "${SHARED_CONTRACT_BRANCH}" "origin/${SHARED_CONTRACT_BRANCH}"
            echo "Using existing shared contracts branch: ${SHARED_CONTRACT_BRANCH}"
            exit 0
          fi
          git checkout --orphan "${SHARED_CONTRACT_BRANCH}"
          git rm -rf . || true
          mkdir -p contracts
          touch contracts/.gitkeep
          git add .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Initialize shared contracts branch"
          git push origin "HEAD:${SHARED_CONTRACT_BRANCH}"
          git checkout "${SHARED_CONTRACT_BRANCH}"
        env:
          GH_REPO_DISPATCH_TOKEN: ${{ secrets.GH_REPO_DISPATCH_TOKEN }}

      - name: Publish Contract Files To Shared Branch
        run: |
          cd contracts-repo
          if git ls-remote --exit-code --heads origin "${SHARED_CONTRACT_BRANCH}" >/dev/null 2>&1; then
            git fetch origin "${SHARED_CONTRACT_BRANCH}"
            git checkout -B "${SHARED_CONTRACT_BRANCH}" "origin/${SHARED_CONTRACT_BRANCH}"
          else
            git checkout --orphan "${SHARED_CONTRACT_BRANCH}"
            git rm -rf . || true
          fi
          mkdir -p "contracts/pacts/${PACTICIPANT}/${GITHUB_SHA}"
          mkdir -p "contracts/latest/${PACTICIPANT}"
          cp "${GITHUB_WORKSPACE}"/build/pacts/*.json "contracts/pacts/${PACTICIPANT}/${GITHUB_SHA}/"
          echo "${GITHUB_SHA}" > "contracts/latest/${PACTICIPANT}/latest.sha"
          cat > "contracts/latest/${PACTICIPANT}/metadata.json" <<EOF
          {
            "consumer": "${PACTICIPANT}",
            "consumerVersion": "${GITHUB_SHA}",
            "branch": "${GITHUB_REF_NAME}",
            "publishedAt": "$(date -u +%FT%TZ)",
            "sourceRepository": "${GITHUB_REPOSITORY}"
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add contracts
          if git diff --cached --quiet; then
            echo "No shared contract updates."
            exit 0
          fi
          git commit -m "Publish contracts for ${PACTICIPANT}@${GITHUB_SHA}"
          git push origin "HEAD:${SHARED_CONTRACT_BRANCH}"

      - name: Trigger Provider Contract Verification
        run: |
          if [ -z "${GH_REPO_DISPATCH_TOKEN:-}" ]; then
            echo "GH_REPO_DISPATCH_TOKEN not set. Cannot trigger provider verification."
            exit 1
          fi
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_REPO_DISPATCH_TOKEN}" \
            https://api.github.com/repos/${PROVIDER_REPO}/dispatches \
            -d "{\"event_type\":\"consumer-contract-updated\",\"client_payload\":{\"source_repo\":\"${GITHUB_REPOSITORY}\",\"source_sha\":\"${GITHUB_SHA}\",\"shared_contract_repo\":\"${SHARED_CONTRACT_REPO}\",\"shared_contract_branch\":\"${SHARED_CONTRACT_BRANCH}\",\"consumer_pacticipant\":\"${PACTICIPANT}\",\"provider_pacticipant\":\"${PROVIDER_PACTICIPANT}\",\"deploy_env\":\"${DEPLOY_ENV}\"}}"
        env:
          GH_REPO_DISPATCH_TOKEN: ${{ secrets.GH_REPO_DISPATCH_TOKEN }}

      - name: Can I Deploy Equivalent (Wait For Provider Verification Status)
        run: |
          if [ -z "${GH_REPO_DISPATCH_TOKEN:-}" ]; then
            echo "GH_REPO_DISPATCH_TOKEN not set. Cannot evaluate deployment gate."
            exit 1
          fi
          STATUS_FILE="contracts/verification/${PACTICIPANT}/${GITHUB_SHA}/${PROVIDER_PACTICIPANT}-${DEPLOY_ENV}.json"
          for i in {1..30}; do
            rm -rf contracts-poll
            git clone --depth 1 --branch "${SHARED_CONTRACT_BRANCH}" \
              "https://x-access-token:${GH_REPO_DISPATCH_TOKEN}@github.com/${SHARED_CONTRACT_REPO}.git" contracts-poll
            if [ -f "contracts-poll/${STATUS_FILE}" ]; then
              echo "Found verification status: ${STATUS_FILE}"
              cat "contracts-poll/${STATUS_FILE}"
              RESULT="$(jq -r '.result' "contracts-poll/${STATUS_FILE}")"
              if [ "${RESULT}" = "SUCCESS" ]; then
                echo "Can I Deploy equivalent: YES"
                exit 0
              fi
              echo "Can I Deploy equivalent: NO"
              exit 1
            fi
            echo "Verification status not ready yet. Waiting..."
            sleep 20
          done
          echo "Timed out waiting for provider verification status."
          exit 1
        env:
          GH_REPO_DISPATCH_TOKEN: ${{ secrets.GH_REPO_DISPATCH_TOKEN }}

  dockerize-and-deploy:
    runs-on: ubuntu-latest
    needs: test-generate-and-publish-contract
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Ensure Gradle Wrapper Is Executable
        run: chmod +x ./gradlew

      - name: Build Application Jar
        run: ./gradlew --no-daemon clean bootJar -x test --stacktrace
        env:
          GH_PACKAGES_USER: ${{ github.actor }}
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and Push Consumer Image
        run: |
          if [ -z "${DOCKERHUB_USERNAME:-}" ] || [ -z "${DOCKERHUB_TOKEN:-}" ]; then
            echo "Docker Hub credentials not set. Skipping image build/push."
            exit 0
          fi
          echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
          docker buildx create --use --name cdc-consumer-builder || true
          docker buildx build \
            --push \
            -t "${DOCKERHUB_USERNAME}/cdc-docker-consumer:${GITHUB_SHA}" \
            -t "${DOCKERHUB_USERNAME}/cdc-docker-consumer:latest" \
            .
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
