name: Consumer CDC Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  repository_dispatch:
    types: [ provider-contract-updated, provider-code-updated ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
  JAVA_VERSION: "17"
  CDC_FRAMEWORK_VERSION: ${{ vars.CDC_FRAMEWORK_VERSION }}
  CDC_PACKAGES_OWNER: ${{ vars.CDC_PACKAGES_OWNER }}
  CDC_PACKAGES_REPO: ${{ vars.CDC_PACKAGES_REPO }}
  PACTICIPANT: supply-orders-consumer
  DEPLOY_ENV: test
  PROVIDER_REPO: ${{ vars.PROVIDER_REPO || 'pravi976/cdc-docker-provider' }}

jobs:
  test-generate-and-publish-pact:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: pact
          POSTGRES_USER: pact
          POSTGRES_PASSWORD: pact
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U pact -d pact"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      pact-broker:
        image: pactfoundation/pact-broker:latest
        env:
          PACT_BROKER_DATABASE_ADAPTER: postgres
          PACT_BROKER_DATABASE_HOST: postgres
          PACT_BROKER_DATABASE_NAME: pact
          PACT_BROKER_DATABASE_USERNAME: pact
          PACT_BROKER_DATABASE_PASSWORD: pact
        ports:
          - 9292:9292
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Ensure Gradle Wrapper Is Executable
        run: chmod +x ./gradlew

      - name: Run Consumer Tests and Generate Pacts
        run: ./gradlew --no-daemon clean test bootJar --stacktrace
        env:
          GH_PACKAGES_USER: ${{ github.actor }}
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Upload Pact Artifacts
        uses: actions/upload-artifact@v5
        with:
          name: consumer-pacts
          path: build/pacts/*.json
          if-no-files-found: error

      - name: Wait for Pact Broker
        run: |
          for i in {1..60}; do
            if curl -fsS http://localhost:9292 > /dev/null; then
              echo "Pact Broker is ready."
              exit 0
            fi
            sleep 2
          done
          echo "Pact Broker did not become ready in time."
          exit 1

      - name: Install Pact Broker CLI
        run: |
          gem install --user-install pact_broker-client --no-document
          ruby -e 'print Gem.user_dir' > .gem_user_dir
          GEM_USER_DIR="$(cat .gem_user_dir)"
          echo "${GEM_USER_DIR}/bin" >> "${GITHUB_PATH}"

      - name: Publish Pacts to Broker
        run: |
          PACT_BROKER_BASE_URL="http://localhost:9292"
          AUTH_ARGS=()
          if [ -n "${PACT_BROKER_USERNAME:-}" ] && [ -n "${PACT_BROKER_PASSWORD:-}" ]; then
            AUTH_ARGS+=(--broker-username "${PACT_BROKER_USERNAME}" --broker-password "${PACT_BROKER_PASSWORD}")
          fi
          pact-broker publish "${GITHUB_WORKSPACE}/build/pacts" \
            --broker-base-url "${PACT_BROKER_BASE_URL}" \
            "${AUTH_ARGS[@]}" \
            --consumer-app-version "${GITHUB_SHA}" \
            --branch "${GITHUB_REF_NAME}"
        env:
          PACT_BROKER_USERNAME: ${{ secrets.PACT_BROKER_USERNAME }}
          PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}

      - name: Can I Deploy (Consumer)
        run: |
          PACT_BROKER_BASE_URL="http://localhost:9292"
          AUTH_ARGS=()
          if [ -n "${PACT_BROKER_USERNAME:-}" ] && [ -n "${PACT_BROKER_PASSWORD:-}" ]; then
            AUTH_ARGS+=(--broker-username "${PACT_BROKER_USERNAME}" --broker-password "${PACT_BROKER_PASSWORD}")
          fi
          echo "Waiting for provider deployment/verification state in Pact Broker..."
          pact-broker can-i-deploy \
            --broker-base-url "${PACT_BROKER_BASE_URL}" \
            "${AUTH_ARGS[@]}" \
            --pacticipant "${PACTICIPANT}" \
            --version "${GITHUB_SHA}" \
            --to-environment "${DEPLOY_ENV}" \
            --retry-while-unknown 30 \
            --retry-interval 10
        env:
          PACT_BROKER_USERNAME: ${{ secrets.PACT_BROKER_USERNAME }}
          PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}

  dockerize-and-deploy:
    runs-on: ubuntu-latest
    needs: test-generate-and-publish-pact
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Ensure Gradle Wrapper Is Executable
        run: chmod +x ./gradlew

      - name: Build Application Jar
        run: ./gradlew --no-daemon clean bootJar -x test --stacktrace
        env:
          GH_PACKAGES_USER: ${{ github.actor }}
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Build and Push Consumer Image
        run: |
          if [ -z "${DOCKERHUB_USERNAME:-}" ] || [ -z "${DOCKERHUB_TOKEN:-}" ]; then
            echo "Docker Hub credentials not set. Skipping image build/push."
            exit 0
          fi
          echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
          docker buildx create --use --name cdc-consumer-builder || true
          docker buildx build \
            --push \
            -t "${DOCKERHUB_USERNAME}/cdc-docker-consumer:${GITHUB_SHA}" \
            -t "${DOCKERHUB_USERNAME}/cdc-docker-consumer:latest" \
            .
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          if [ -z "${KUBE_CONFIG_DATA:-}" ]; then
            echo "KUBE_CONFIG_DATA not set. Skipping kubeconfig setup."
            exit 0
          fi
          mkdir -p "${HOME}/.kube"
          echo "${KUBE_CONFIG_DATA}" | base64 -d > "${HOME}/.kube/config"
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}

      - name: Deploy Consumer to Kubernetes
        run: |
          if [ -z "${KUBE_CONFIG_DATA:-}" ] || [ -z "${DOCKERHUB_USERNAME:-}" ]; then
            echo "Kubernetes config or Docker Hub username not set. Skipping Kubernetes deploy."
            exit 0
          fi
          sed "s|__IMAGE__|${DOCKERHUB_USERNAME}/cdc-docker-consumer:${GITHUB_SHA}|g" k8s/deployment.yaml | kubectl apply -f -
          kubectl apply -f k8s/service.yaml
          kubectl rollout status deployment/cdc-docker-consumer --timeout=180s
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

      - name: Record Consumer Deployment in Broker
        run: |
          PACT_BROKER_BASE_URL="http://localhost:9292"
          AUTH_ARGS=()
          if [ -n "${PACT_BROKER_USERNAME:-}" ] && [ -n "${PACT_BROKER_PASSWORD:-}" ]; then
            AUTH_ARGS+=(--broker-username "${PACT_BROKER_USERNAME}" --broker-password "${PACT_BROKER_PASSWORD}")
          fi
          pact-broker record-deployment \
            --broker-base-url "${PACT_BROKER_BASE_URL}" \
            "${AUTH_ARGS[@]}" \
            --pacticipant "${PACTICIPANT}" \
            --version "${GITHUB_SHA}" \
            --environment "${DEPLOY_ENV}"
        env:
          PACT_BROKER_USERNAME: ${{ secrets.PACT_BROKER_USERNAME }}
          PACT_BROKER_PASSWORD: ${{ secrets.PACT_BROKER_PASSWORD }}

  notify-provider:
    runs-on: ubuntu-latest
    needs: test-generate-and-publish-pact
    if: ${{ github.event_name != 'repository_dispatch' && github.ref == 'refs/heads/main' }}
    steps:
      - name: Trigger Provider Validation Workflow
        run: |
          if [ -z "${GH_REPO_DISPATCH_TOKEN:-}" ]; then
            echo "GH_REPO_DISPATCH_TOKEN not set. Skipping provider dispatch."
            exit 0
          fi
          curl -sS -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_REPO_DISPATCH_TOKEN}" \
            https://api.github.com/repos/${PROVIDER_REPO}/dispatches \
            -d "{\"event_type\":\"consumer-contract-updated\",\"client_payload\":{\"source_repo\":\"${GITHUB_REPOSITORY}\",\"source_sha\":\"${GITHUB_SHA}\",\"source_workflow\":\"consumer-cdc\"}}"
        env:
          GH_REPO_DISPATCH_TOKEN: ${{ secrets.GH_REPO_DISPATCH_TOKEN }}
